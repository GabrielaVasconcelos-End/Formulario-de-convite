<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Crie seu convite</title>
  <link rel="stylesheet" href="styles/index.css">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Leckerli+One&family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="app"> 
      <aside>
        <div class="aside-container">
          <header>
            <img src="assets/Logo.svg" alt="Logo">
            <h1>Festivite</h1>
            <p>Crie um convite digital para o seu evento</p>
          </header>
        </div>
      </aside>

      <main>
        <div class="main-container">
          <h2>Crie seu convite</h2>

          <form>
            <fieldset>
              <legend>
                <img src="assets/icons/calendar.png" alt="Icone de calendário">
                Sobre o evento 
              </legend>

              <div class="input-wrapper">
                <label for="title">Titulo</label>
                <input id="title" name="title" placeholder="Nome do evento">
              </div>

              <div class="input-row">
                <div class="input-wrapper">
                  <label for="date-start">Início</label>
                  <input type="text" id="date-start" name="date-start" placeholder="DD/MM/AA --:--" inputmode="numeric" maxlength="14" pattern="[0-9]{2}/[0-9]{2}/[0-9]{2} [0-9]{2}:[0-9]{2}" title="Use o formato DD/MM/AA HH:MM">
                </div>
                <div class="input-wrapper">
                  <label for="date-end">Fim</label>
                  <input type="text" id="date-end" name="date-end" placeholder="DD/MM/AA --:--" inputmode="numeric" maxlength="14" pattern="[0-9]{2}/[0-9]{2}/[0-9]{2} [0-9]{2}:[0-9]{2}" title="Use o formato DD/MM/AA HH:MM">
                </div>
              </div>

              <div class="input-row">
                <div class="input-wrapper">
                  <label>Tipo</label>
                  <div class="toggle-group">
                    <label class="toggle-option">
                      <input type="radio" name="type" value="presencial" checked>
                      <img src="assets/icons/building-2.png" alt="">
                      Presencial
                    </label>
                    <label class="toggle-option">
                      <input type="radio" name="type" value="online">
                      <img src="assets/icons/video.png" alt="">
                      Online
                    </label>
                  </div>
                </div>
                <div class="input-wrapper">
                  <label for="local">Local</label>
                  <input type="url" id="local" name="local" placeholder="Link ou endereço">
                </div>
              </div>

              <div class="input-wrapper">
                <label for="description">Descrição</label>
                <textarea id="description" name="description" cols="30" rows="10" placeholder="Escreva sobre os detalhes do evento"></textarea>
              </div>
            </fieldset>
        

            <fieldset class="personalizacao">
              <legend>
                <img src="assets/icons/paintbrush-vertical.png" alt="Icone de pincel">
                Personalização
              </legend>
              <div class="personalizacao-grupo">
                <label>Cor principal</label>
                <div class="paleta-cores">
                  <input type="radio" id="cor-brand-light" name="cor-principal" class="sr-only cor-input" checked>
                  <label for="cor-brand-light" class="cor" style="--cor:#59B2FF;" aria-label="Azul claro"></label>

                  <input type="radio" id="cor-navy" name="cor-principal" class="sr-only cor-input">
                  <label for="cor-navy" class="cor" style="--cor:#6A59FF;" aria-label="Navy"></label>

                  <input type="radio" id="cor-purple" name="cor-principal" class="sr-only cor-input">
                  <label for="cor-purple" class="cor" style="--cor:#B259FF;" aria-label="Roxo"></label>

                  <input type="radio" id="cor-fuschia" name="cor-principal" class="sr-only cor-input">
                  <label for="cor-fuschia" class="cor" style="--cor:#FF59F9;" aria-label="Fuschia"></label>

                  <input type="radio" id="cor-pink" name="cor-principal" class="sr-only cor-input">
                  <label for="cor-pink" class="cor" style="--cor:#FF598B;" aria-label="Rosa"></label>

                  <input type="radio" id="cor-danger" name="cor-principal" class="sr-only cor-input">
                  <label for="cor-danger" class="cor" style="--cor:#FF5959;" aria-label="Vermelho"></label>

                  <input type="radio" id="cor-orange" name="cor-principal" class="sr-only cor-input">
                  <label for="cor-orange" class="cor" style="--cor:#FF8B59;" aria-label="Laranja"></label>

                  <input type="radio" id="cor-yellow" name="cor-principal" class="sr-only cor-input">
                  <label for="cor-yellow" class="cor" style="--cor:#FFCD59;" aria-label="Amarelo"></label>

                  <input type="radio" id="cor-lime" name="cor-principal" class="sr-only cor-input">
                  <label for="cor-lime" class="cor" style="--cor:#E1FF59;" aria-label="Lima"></label>

                  <input type="radio" id="cor-green" name="cor-principal" class="sr-only cor-input">
                  <label for="cor-green" class="cor" style="--cor:#59FF91;" aria-label="Verde"></label>

                  <input type="radio" id="cor-cyan" name="cor-principal" class="sr-only cor-input">
                  <label for="cor-cyan" class="cor" style="--cor:#59FFF9;" aria-label="Ciano"></label>
                </div>
              </div>

              <div class="personalizacao-grupo">
                <label>Tema do evento</label>
                <section class="grade-temas">
                  <input type="radio" id="tema-aniversario" name="tema-evento" class="sr-only tema-input" checked>
                  <label for="tema-aniversario" class="tema-card"><img src="assets/image/Image.png" alt="Aniversário"><span>Aniversário</span></label>

                  <input type="radio" id="tema-infantil" name="tema-evento" class="sr-only tema-input">
                  <label for="tema-infantil" class="tema-card"><img src="assets/image/Image (1).png" alt="Infantil"><span>Infantil</span></label>

                  <input type="radio" id="tema-formatura" name="tema-evento" class="sr-only tema-input">
                  <label for="tema-formatura" class="tema-card"><img src="assets/image/Image (2).png" alt="Formatura"><span>Formatura</span></label>

                  <input type="radio" id="tema-casamento" name="tema-evento" class="sr-only tema-input">
                  <label for="tema-casamento" class="tema-card"><img src="assets/image/Image (3).png" alt="Casamento"><span>Casamento</span></label>

                  <input type="radio" id="tema-cha-bebe" name="tema-evento" class="sr-only tema-input">
                  <label for="tema-cha-bebe" class="tema-card"><img src="assets/image/Image (4).png" alt="Chá de bebê"><span>Chá de bebê</span></label>

                  <input type="radio" id="tema-cha-panela" name="tema-evento" class="sr-only tema-input">
                  <label for="tema-cha-panela" class="tema-card"><img src="assets/image/Image (5).png" alt="Chá de panela"><span>Chá de panela</span></label>

                  <input type="radio" id="tema-carnaval" name="tema-evento" class="sr-only tema-input">
                  <label for="tema-carnaval" class="tema-card"><img src="assets/image/Image (6).png" alt="Carnaval"><span>Carnaval</span></label>

                  <input type="radio" id="tema-pascoa" name="tema-evento" class="sr-only tema-input">
                  <label for="tema-pascoa" class="tema-card"><img src="assets/image/Image (7).png" alt="Páscoa"><span>Páscoa</span></label>

                  <input type="radio" id="tema-sao-joao" name="tema-evento" class="sr-only tema-input">
                  <label for="tema-sao-joao" class="tema-card"><img src="assets/image/Image (8).png" alt="São João"><span>São João</span></label>

                  <input type="radio" id="tema-halloween" name="tema-evento" class="sr-only tema-input">
                  <label for="tema-halloween" class="tema-card"><img src="assets/image/Image (9).png" alt="Halloween"><span>Halloween</span></label>

                  <input type="radio" id="tema-natal" name="tema-evento" class="sr-only tema-input">
                  <label for="tema-natal" class="tema-card"><img src="assets/image/Image (10).png" alt="Natal"><span>Natal</span></label>

                  <input type="radio" id="tema-outro" name="tema-evento" class="sr-only tema-input">
                  <label for="tema-outro" class="tema-card"><img src="assets/image/Image (11).png" alt="Outro"><span>Outro</span></label>
                </section>
              </div>

              <div class="personalizacao-rodape">
                <div class="estilo-box">
                  <label>Estilo</label>
                  <div class="estilo-linha">
                    <input type="checkbox" id="estilo-escuro" name="estilo-escuro" class="sr-only estilo-input" checked>
                    <label for="estilo-escuro" class="toggle-estilo"></label>
                    <span>Escuro</span>
                  </div>
                </div>

                <div class="capa-box">
                  <label for="imagem">Foto de capa</label>
                  <div class="upload-linha">
                    <label for="imagem" class="btn-upload">
                      <img src="assets/icons/upload.png" alt="icone de upload">
                      Selecionar</label>
                    <span>Nenhum arquivo selecionado</span>
                  </div>
                  <input type="file" id="imagem" name="imagem" accept="image/*" hidden>
                </div>
              </div>
            </fieldset>

            <fieldset class="contato-fieldset">
              <legend>
                <img src="assets/icons/contact.png" alt="Icone de contato">
                Dados para contato 
              </legend>

                <div class="input-wrapper">
                  <label for="Nome">Nome</label>
                  <input id="Nome" name="Nome" placeholder="Nome completo">
                  <span class="field-error">
                    <img src="assets/icons/circle-alert.png" alt="">
                    Campo obrigatório
                  </span>
                </div>

                <div class="input-row contato-row">
                  <div class="input-wrapper">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="exemplo@email.com">
                  </div>

                  <div class="input-wrapper">
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone" placeholder="(99) 99999-9999">
                  </div>
                </div>
            </fieldset>

            <div class="termos-wrapper">
              <hr class="termos-divider">

              <label class="termo-item">
                <input type="checkbox" id="termos" name="termos" class="sr-only termo-check" checked>
                <span class="check-ui" aria-hidden="true"></span>
                <span class="termo-text">Li e concordo com os <a href="#">Termos e Condições</a> e com a <a href="#">Política de Privacidade</a></span>
              </label>

              <label class="termo-item">
                <input type="checkbox" id="promo-email" name="promo-email" class="sr-only termo-check">
                <span class="check-ui" aria-hidden="true"></span>
                <span class="termo-text">Aceito receber atualizações e promoções por e-mail</span>
              </label>
            
              <label class="termo-item">
                <input type="checkbox" id="promo-sms" name="promo-sms" class="sr-only termo-check">
                <span class="check-ui" aria-hidden="true"></span>
                <span class="termo-text">Aceito receber atualizações e promoções por SMS</span>
              </label>

              <div class="submit-wrap">
                <button type="submit" class="btn-submit">
                  <img src="assets/icons/ticket.png" alt="">
                  Gerar convite
                </button>
              </div>
            </div>
          </form>
        </div>
      </main>
    </div>
    
  
</body>
</html>
